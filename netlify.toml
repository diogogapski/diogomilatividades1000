[build]
  publish = "public"
  command = "npm run netlify-build"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  included_files = ["server.js", "data/**", "delivery/**", "public/**"]

[[redirects]]
  from = "/api/checkout"
  to = "/.netlify/functions/checkout"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/checkout"
  to = "/checkout.html"
  status = 200

[[redirects]]
  from = "/obrigado"
  to = "/obrigado.html"
  status = 200

[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
